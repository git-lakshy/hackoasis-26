---
# Idle pods - No CPU requests (waste pattern)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: idle-web-app
  namespace: default
  labels:
    app: idle-web
    waste-type: idle
spec:
  replicas: 3
  selector:
    matchLabels:
      app: idle-web
  template:
    metadata:
      labels:
        app: idle-web
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        # NO resource requests - will be detected as idle/misconfigured
        ports:
        - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: idle-api-server
  namespace: default
  labels:
    app: idle-api
    waste-type: idle
spec:
  replicas: 2
  selector:
    matchLabels:
      app: idle-api
  template:
    metadata:
      labels:
        app: idle-api
    spec:
      containers:
      - name: api
        image: httpd:alpine
        # NO resource requests
        ports:
        - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: idle-worker
  namespace: dev
  labels:
    app: idle-worker
    waste-type: idle
spec:
  replicas: 5
  selector:
    matchLabels:
      app: idle-worker
  template:
    metadata:
      labels:
        app: idle-worker
    spec:
      containers:
      - name: worker
        image: busybox
        command: ["sleep", "infinity"]
        # NO resource requests - waste!
