services:
  - type: web
    name: baburao-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /status
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: NOTIFY_EMAIL
        sync: false
